[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    network: tests que requieren acceso real a red (yfinance, GitHub, Wikipedia).
              Excluidos por defecto. Ejecutar con: pytest -m network

; Por defecto NO se ejecutan los tests marcados como "network" (requieren
; conexión real y son más lentos/menos deterministas). Para incluirlos:
;   pytest -m network
; Para ejecutar todo (unitarios + red):
;   pytest -m "" 
addopts = -m "not network" --strict-markers -v
